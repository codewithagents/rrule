name: Conformance Fuzzer (nightly)

# Non-hermetic: requires Python + python-dateutil.
# NOT part of the per-PR CI path (ci.yml runs on pull_request; this does not).
# Runs nightly and can be triggered manually via workflow_dispatch.

on:
  schedule:
    # Nightly at 02:30 UTC
    - cron: '30 2 * * *'
  workflow_dispatch:
    inputs:
      seed:
        description: 'fast-check seed for reproducibility'
        required: false
        default: '1337'
        type: string
      count:
        description: 'Number of fuzz cases to generate'
        required: false
        default: '500'
        type: string

# Minimal permissions: no secrets needed, contents read-only
permissions:
  contents: read

jobs:
  fuzz:
    name: Differential Fuzzer (seed=${{ inputs.seed || '1337' }}, count=${{ inputs.count || '500' }})
    runs-on: ubuntu-latest

    steps:
      # SHA-pinned to actions/checkout v4 (tag 4.2.2)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # SHA-pinned to pnpm/action-setup v6.0.9
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

      # SHA-pinned to actions/setup-node v4.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: pnpm

      # SHA-pinned to actions/setup-python v5.6.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'
          cache: pip

      - name: Install python-dateutil oracle dependency
        run: pip install -r packages/conformance/oracle/requirements.txt

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (rrule-ts must be built before conformance can import it)
        run: pnpm build

      - name: Run differential fuzzer
        env:
          FUZZ_SEED: ${{ inputs.seed || '1337' }}
          FUZZ_COUNT: ${{ inputs.count || '500' }}
        # Exit code 1 = non-DST divergences detected (real bugs).
        # Exit code 0 = all matched, or only DST-candidate divergences (informational).
        run: pnpm --filter rrule-ts-conformance fuzz
